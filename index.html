<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PN Network</title>
    <style>
      :root {
        --bg: #ececec;
        --spinner-track: #d3d8dd;
        --spinner-active: #455a71;
        --button-bg: #101010;
        --button-text: #ffffff;
      }

      * { box-sizing: border-box; }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: Arial, Helvetica, sans-serif;
        background: var(--bg);
        display: grid;
        place-items: center;
      }

      .spinner {
        width: 36px;
        height: 36px;
        border-radius: 50%;
        border: 4px solid var(--spinner-track);
        border-top-color: var(--spinner-active);
        animation: spin 0.95s linear infinite;
      }

      .base44-link {
        position: fixed;
        right: 16px;
        bottom: 16px;
        background: var(--button-bg);
        color: var(--button-text);
        text-decoration: none;
        padding: 10px 12px;
        border-radius: 8px;
        display: inline-flex;
        align-items: center;
        gap: 8px;
        font-size: 15px;
        line-height: 1;
        box-shadow: 0 2px 8px rgb(0 0 0 / 22%);
      }

      .dot {
        width: 14px;
        height: 14px;
        border-radius: 50%;
        background: linear-gradient(145deg, #ff7a18, #ff4f00);
      }

      @keyframes spin {
        from { transform: rotate(0deg); }
        to { transform: rotate(360deg); }
      }
    </style>
  </head>
  <body>
    <div class="spinner" aria-label="Carregando"></div>

    <a class="base44-link" href="#" aria-label="Edit with Base44">
      <span class="dot" aria-hidden="true"></span>
      <span>Edit with Base44</span>
      <span aria-hidden="true">×</span>
    </a>
  </body>
</html>
